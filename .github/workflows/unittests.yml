name: Unit Tests & CI/CD

on:
  push:
    branches: [ main, develop, task-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install PostgreSQL client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic==1.10.7
        pip install fastapi==0.85.0
        pip install dagster==1.3.14 dagster-webserver==1.3.14
        pip install dbt-postgres
        pip install -r requirements.txt --no-deps

    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -U test_user; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done

    - name: Create .env file for testing
      run: |
        echo "DB_HOST=localhost" > .env
        echo "DB_PORT=5432" >> .env
        echo "DB_USER=test_user" >> .env
        echo "DB_PASSWORD=test_pass" >> .env
        echo "DB_NAME=test_db" >> .env
        echo "TELEGRAM_API_ID=123456" >> .env
        echo "TELEGRAM_API_HASH=testhash" >> .env

    - name: Create test database schemas
      run: |
        psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS raw;"
        psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS staging;"
        psql -h localhost -U test_user -d test_db -c "CREATE SCHEMA IF NOT EXISTS marts;"

    - name: Update profiles.yml for CI
      run: |
        cat > medical_warehouse/profiles.yml << EOF
        medical_warehouse:
          target: ci
          outputs:
            ci:
              type: postgres
              host: localhost
              port: 5432
              user: test_user
              password: test_pass
              dbname: test_db
              schema: staging
              threads: 4
        EOF

    - name: Test dbt connection
      run: |
        cd medical_warehouse
        dbt debug --target ci

    - name: Run dbt models
      run: |
        cd medical_warehouse
        dbt run --target ci

    - name: Run dbt tests
      run: |
        cd medical_warehouse
        dbt test --target ci

    - name: Run Python tests
      run: |
        pytest tests/ -v --ignore=medical_warehouse || true